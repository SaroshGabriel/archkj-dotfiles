################
### MONITORS ###
################
monitor=HDMI-A-2,1920x1080@120,0x0,1
monitor=eDP-1,1920x1080@60,1920x0,1
monitor=,preferred,auto,1

# Workspace assignments
# HDMI external monitor gets workspaces 1-9
workspace = 1, monitor:HDMI-A-2, default:true
workspace = 2, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:HDMI-A-2
workspace = 5, monitor:HDMI-A-2
workspace = 6, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2

# Laptop screen gets workspaces 11-19
workspace = 11, monitor:eDP-1, default:true
workspace = 12, monitor:eDP-1
workspace = 13, monitor:eDP-1
workspace = 14, monitor:eDP-1
workspace = 15, monitor:eDP-1
workspace = 16, monitor:eDP-1
workspace = 17, monitor:eDP-1
workspace = 18, monitor:eDP-1
workspace = 19, monitor:eDP-1

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar > /dev/null 2>&1
exec-once = udiskie --tray &
exec-once = wl-paste --watch cliphist store

exec-once = dunst
exec-once = hypridle
exec-once = bash -c "awww-daemon &>/dev/null"
exec-once = sleep 2 && ~/.config/hypr/wallpaper.sh

# Focus primary monitor on boot
# External Monitor (HDMI-A-2) workspaces 1-6
exec-once = ~/.config/hypr/fix-brave.sh
exec-once = [workspace 1 silent] brave
exec-once = [workspace 1 silent] kitty
exec-once = sleep 3 && hyprctl dispatch -- exec "[workspace 2 silent] kitty -e ssh ratPI"
exec-once = sleep 6 && hyprctl dispatch -- exec "[workspace 3 silent] brave"
exec-once = sleep 6 && hyprctl dispatch -- exec "[workspace 3 silent] kitty -e nifty"
exec-once = sleep 9 && hyprctl dispatch -- exec "[workspace 4 silent] kitty -e btop"
exec-once = sleep 12 && deluge
exec-once = sleep 15 && hyprctl dispatch -- exec "[workspace 6 silent] thunar"

# Laptop Monitor (eDP-1) workspaces 11-16
exec-once = sleep 4 && hyprctl dispatch -- exec "[workspace 11 silent] kitty"
exec-once = sleep 7 && hyprctl dispatch -- exec "[workspace 12 silent] spotify"
exec-once = sleep 10 && hyprctl dispatch -- exec "[workspace 13 silent] Telegram"

# Set focus to workspace 1 on external monitor
exec-once = sleep 3 && hyprctl dispatch workspace 1 && hyprctl dispatch focusmonitor HDMI-A-2


# Autostart apps on workspaces

# Set workspace 1 active on boot

# Ensure laptop screen starts on workspace 11
exec-once = sleep 2 && hyprctl dispatch focusmonitor eDP-1 && hyprctl dispatch workspace 11 && hyprctl dispatch focusmonitor HDMI-A-2

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = WLR_DRM_DEVICES,/dev/dri/card1
env = XCURSOR_THEME,Breeze
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,i965
env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland

exec-once = hyprctl setcursor Breeze 24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 10
    gaps_out = 40
    border_size = 3
    col.active_border = rgba(EF3946ff) rgba(EF3946ff) 45deg
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.8
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(EF3946ff)
        color_inactive = rgba(00000000)
    }

    blur {
        enabled = true
        size = 1
        passes = 5
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = winIn, 0.1, 1.0, 0.1, 1.0
    bezier = winOut, 0.1, 1.0, 0.1, 1.0
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = layerOut, 0.23, 1, 0.32, 1
    animation = windows, 1, 7, winIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 7, winIn, slide
    animation = workspaces, 1, 8, winIn, slide
    animation = workspacesOut, 1, 8, winOut, slide
    animation = layers, 1, 10, winIn, slide
    animation = layersOut, 1, 3, layerOut, popin 50%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0.8
    repeat_rate = 50
    repeat_delay = 200
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

###################
### KEYBINDINGS ###
###################

# Applications
bind = SUPER, Return, exec, kitty
bind = SUPER, D, exec, rofi -show drun
bind = SUPER, E, exec, thunar
bind = SUPER, B, exec, brave
bind = SUPER, M, exec, kitty --class floating-cava -e cava

# Window Management
bind = SUPER, Q, killactive
bind = SUPER SHIFT, Q, exit
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER, T, togglesplit
bind = SUPER, W, exec, killall waybar || waybar > /dev/null 2>&1

# Focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move Windows
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Resize Windows
bind = SUPER CTRL, left, resizeactive, -40 0
bind = SUPER CTRL, right, resizeactive, 40 0
bind = SUPER CTRL, up, resizeactive, 0 -40
bind = SUPER CTRL, down, resizeactive, 0 40

# Alt+Tab
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev

# Monitor focus
bind = SUPER, P, focusmonitor, +1
bind = SUPER SHIFT, P, movewindow, mon:+1

# Workspace Navigation
bind = SUPER, TAB, workspace, e+1
bind = SUPER SHIFT, TAB, workspace, e-1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Workspaces - Primary Monitor HDMI (1-9)
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Workspaces - Laptop screen (11-19)
bind = ALT, 1, workspace, 11
bind = ALT, 2, workspace, 12
bind = ALT, 3, workspace, 13
bind = ALT, 4, workspace, 14
bind = ALT, 5, workspace, 15
bind = ALT, 6, workspace, 16
bind = ALT, 7, workspace, 17
bind = ALT, 8, workspace, 18
bind = ALT, 9, workspace, 19

# Move to Workspace - Primary
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Move to Workspace - Laptop
bind = ALT SHIFT, 1, movetoworkspace, 11
bind = ALT SHIFT, 2, movetoworkspace, 12
bind = ALT SHIFT, 3, movetoworkspace, 13
bind = ALT SHIFT, 4, movetoworkspace, 14
bind = ALT SHIFT, 5, movetoworkspace, 15
bind = ALT SHIFT, 6, movetoworkspace, 16
bind = ALT SHIFT, 7, movetoworkspace, 17
bind = ALT SHIFT, 8, movetoworkspace, 18
bind = ALT SHIFT, 9, movetoworkspace, 19

# Cross-monitor movement (HDMI → Laptop)
bind = SUPER CTRL, 1, movetoworkspace, 11
bind = SUPER CTRL, 2, movetoworkspace, 12
bind = SUPER CTRL, 3, movetoworkspace, 13
bind = SUPER CTRL, 4, movetoworkspace, 14
bind = SUPER CTRL, 5, movetoworkspace, 15
bind = SUPER CTRL, 6, movetoworkspace, 16
bind = SUPER CTRL, 7, movetoworkspace, 17
bind = SUPER CTRL, 8, movetoworkspace, 18
bind = SUPER CTRL, 9, movetoworkspace, 19

# Cross-monitor movement (Laptop → HDMI)
bind = ALT CTRL, 1, movetoworkspace, 1
bind = ALT CTRL, 2, movetoworkspace, 2
bind = ALT CTRL, 3, movetoworkspace, 3
bind = ALT CTRL, 4, movetoworkspace, 4
bind = ALT CTRL, 5, movetoworkspace, 5
bind = ALT CTRL, 6, movetoworkspace, 6
bind = ALT CTRL, 7, movetoworkspace, 7
bind = ALT CTRL, 8, movetoworkspace, 8
bind = ALT CTRL, 9, movetoworkspace, 9

# Screenshots
bind = , Print, exec, hyprshot -m region --clipboard-only
bind = SHIFT, Print, exec, hyprshot -m output --clipboard-only
bind = CTRL, Print, exec, hyprshot -m window --clipboard-only
bind = ALT, Print, exec, sleep 3 && hyprshot -m output --clipboard-only

# System
bind = SUPER, Escape, exec, hyprlock
bind = SUPER, Delete, exec, ~/.config/rofi/powermenu.sh

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

